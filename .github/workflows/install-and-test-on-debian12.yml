# Try to install package on Debian 12 and run some basic commands to check if it's working
on:
  workflow_call:

jobs:
  install-debian-12:
    runs-on: ubuntu-latest
    container:
      # Intentionally using an old image to have a list of packages to update
      image: debian:bookworm-20260518
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get linupdate version
        run: echo "VERSION=$(cat ${GITHUB_WORKSPACE}/version)" >> $GITHUB_ENV

      # Download builded deb package artifact
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: linupdate-test-build_${{ env.VERSION }}_all.deb

      - name: Install package
        run: |
          apt-get update -y
          apt-get install -y ./linupdate-test-build_${{ env.VERSION }}_all.deb

      # Run common test suite (shared across all distributions)
      - name: Run test suite
        env:
          REPOSITORY_TEST_URL: ${{ secrets.REPOSITORY_TEST_URL }}
          REPOSITORY_TEST_TOKEN: ${{ secrets.REPOSITORY_TEST_TOKEN }}
          REPOS_CONFIG_DIR: /etc/apt/sources.list.d
          LINUPDATE_PROFILE: linupdate-ci-debian-systems
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/run-tests.sh
