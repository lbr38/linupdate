# Try to install package on CentOS 8 and run some basic commands to check if it's working
on:
  workflow_call:

jobs:
  install-centos8:
    runs-on: ubuntu-latest
    container:
      image: centos:8
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get linupdate version
        run: echo "VERSION=$(cat ${GITHUB_WORKSPACE}/version)" >> $GITHUB_ENV

      - name: Install CentOS8 archive repositories
        run: |
          cat > /etc/yum.repos.d/CentOS-Linux-AppStream.repo << EOF
          [appstream]
          name=CentOS Linux \$releasever - AppStream
          baseurl=http://vault.centos.org/\$contentdir/\$releasever/AppStream/\$basearch/os/
          gpgcheck=1
          enabled=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-centosofficial
          EOF

          cat > /etc/yum.repos.d/CentOS-Linux-BaseOS.repo << EOF
          [baseos]
          name=CentOS Linux \$releasever - BaseOS
          baseurl=http://vault.centos.org/\$contentdir/\$releasever/BaseOS/\$basearch/os/
          gpgcheck=1
          enabled=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-centosofficial
          EOF

          cat > /etc/yum.repos.d/CentOS-Linux-Extras.repo << EOF
          [extras]
          name=CentOS Linux \$releasever - Extras
          baseurl=http://vault.centos.org/\$contentdir/\$releasever/extras/\$basearch/os/
          gpgcheck=1
          enabled=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-centosofficial
          EOF

          dnf install epel-release -y

          dnf clean all

      - name: Update system
        run: dnf update -y --exclude=centos-release

      # Download builded rpm package artifact
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: linupdate-test-build-${{ env.VERSION }}.noarch.rpm

      - name: Install package
        run: dnf --nogpgcheck install -y ./linupdate-test-build-${{ env.VERSION }}.noarch.rpm

      # Run common test suite (shared across all distributions)
      - name: Run test suite
        env:
          REPOSITORY_TEST_URL: ${{ secrets.REPOSITORY_TEST_URL }}
          REPOSITORY_TEST_TOKEN: ${{ secrets.REPOSITORY_TEST_TOKEN }}
          REPOS_CONFIG_DIR: /etc/yum.repos.d
          LINUPDATE_PROFILE: linupdate-ci-rhel-systems
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/run-tests.sh
