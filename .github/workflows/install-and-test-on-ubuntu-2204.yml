# Try to install package on Ubuntu 22.04 and run some basic commands to check if it's working
on:
  workflow_call:

jobs:
  install-ubuntu-2204:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get linupdate version
        run: echo "VERSION=$(cat ${GITHUB_WORKSPACE}/version)" >> $GITHUB_ENV

      # Download builded deb package artifact
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: linupdate-test-build_${{ env.VERSION }}_all.deb

      - name: Install package
        run: |
          apt-get update -y
          apt-get install -y ./linupdate-test-build_${{ env.VERSION }}_all.deb

      # Run common test suite (shared across all distributions)
      - name: Run test suite
        env:
          REPOSITORY_TEST_URL: ${{ secrets.REPOSITORY_TEST_URL }}
          REPOSITORY_TEST_TOKEN: ${{ secrets.REPOSITORY_TEST_TOKEN }}
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/run-tests.sh
